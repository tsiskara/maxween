<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a1a">
<title>FUSION — Merge. Combo. Conquer. · Maxween</title>
<style>
  /* ============================================================
     FUSION — a juicy physics merge game
     ============================================================ */
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    /* ── Surface ── */
    --bg0:#06040c; --bg1:#120a1f; --surface:#1a1428;
    /* ── Glass material ── */
    --glass:rgba(255,255,255,.05); --glass-brd:rgba(255,255,255,.09);
    /* ── Text ── */
    --txt:#f4f1f8; --dim:#8b8398; --dimmer:#5a5468;
    /* ── Accent ── */
    --gold:#ffc740; --pink:#ff3b5c; --cyan:#36c6ff; --grn:#2ee68a;
    --danger:#ff3b5c; --pur:#b07bff;
    /* ── Typography ── */
    --fam:'SF Pro Display','Inter',-apple-system,system-ui,sans-serif;
    --mono:'SF Mono','JetBrains Mono','Cascadia Code',monospace;
    /* ── Spacing (4 px grid) ── */
    --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:20px; --s6:24px; --s7:32px;
    /* ── Radius ── */
    --r-sm:8px; --r-md:12px; --r-lg:16px; --r-xl:20px; --r-full:24px;
    /* ── Motion ── */
    --ease-out:cubic-bezier(0.16,1,0.3,1);
    --ease-spring:cubic-bezier(0.2,1.4,0.4,1);
    --dur-fast:150ms; --dur:250ms; --dur-slow:400ms;
    /* ── Z-index layers ── */
    --z-base:1; --z-hud:10; --z-overlay:20; --z-modal:30; --z-toast:40; --z-max:60;
  }
  html,body{height:100%}
  body{
    background:
      radial-gradient(1200px 800px at 20% -10%, #1a1040 0%, transparent 55%),
      radial-gradient(1000px 700px at 100% 110%, #082838 0%, transparent 55%),
      linear-gradient(160deg,var(--bg0),var(--bg1));
    color:var(--txt); font-family:var(--fam);
    -webkit-user-select:none; user-select:none;
    -webkit-tap-highlight-color:transparent;
    overflow:hidden; touch-action:none;
    display:flex; align-items:center; justify-content:center;
  }
  /* animated starfield glow */
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; opacity:.5;
    background:
      radial-gradient(2px 2px at 12% 24%, #fff8, transparent),
      radial-gradient(1.5px 1.5px at 78% 16%, #9bf8, transparent),
      radial-gradient(2px 2px at 42% 82%, #f8a8, transparent),
      radial-gradient(1px 1px at 88% 64%, #fff6, transparent),
      radial-gradient(1.5px 1.5px at 24% 60%, #8cf8, transparent);
    animation:tw 6s ease-in-out infinite alternate;
  }
  @keyframes tw{from{opacity:.25}to{opacity:.65}}

  #app{
    position:relative; width:100%; height:100%;
    max-width:560px; max-height:100vh;
    display:flex; flex-direction:column;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }

  /* ---- HUD ---- */
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 14px 6px; gap:8px;
  }
  .logo{
    font-weight:800; letter-spacing:2px; font-size:20px;
    background:linear-gradient(90deg,var(--pink),var(--gold),var(--cyan));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 22px rgba(255,77,141,.35);
    cursor:pointer;
  }
  .stat{
    background:var(--glass); border:1px solid var(--glass-brd);
    border-radius:14px; padding:6px 12px; text-align:center;
    backdrop-filter:blur(8px); min-width:78px;
    transition:transform .15s ease;
  }
  .stat .lab{font-size:9px; color:var(--dim); letter-spacing:1.5px; text-transform:uppercase}
  .stat .val{font-size:18px; font-weight:800; line-height:1.1; font-family:var(--mono); font-variant-numeric:tabular-nums}
  .stat.gold .val{color:var(--gold)}
  .stat.pulse{animation:bp .35s ease}
  @keyframes bp{0%{transform:scale(1)}40%{transform:scale(1.18)}100%{transform:scale(1)}}

  .hud-row{display:flex; gap:8px; align-items:stretch}

  /* ---- Play area ---- */
  main{
    flex:1; position:relative; margin:6px 10px 10px;
    border-radius:22px; overflow:hidden;
    background:
      linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01) 40%, rgba(0,0,0,.25));
    border:1px solid var(--glass-brd);
    box-shadow:inset 0 0 60px rgba(0,0,0,.5), 0 20px 60px rgba(0,0,0,.45);
  }
  #cv{position:absolute; inset:0; width:100%; height:100%; display:block; cursor:pointer}
  /* combo banner */
  #combo{
    position:absolute; left:50%; top:18%; transform:translate(-50%,-50%) scale(.6);
    font-weight:900; letter-spacing:1px; pointer-events:none; opacity:0;
    text-shadow:0 0 18px currentColor; white-space:nowrap;
  }
  #combo.show{animation:cb .7s cubic-bezier(.2,1.4,.4,1) forwards}
  @keyframes cb{
    0%{opacity:0; transform:translate(-50%,-50%) scale(.4)}
    25%{opacity:1; transform:translate(-50%,-60%) scale(1.15)}
    70%{opacity:1; transform:translate(-50%,-65%) scale(1)}
    100%{opacity:0; transform:translate(-50%,-90%) scale(.9)}
  }
  /* next ball preview */
  #next{
    position:absolute; right:10px; bottom:10px;
    display:flex; align-items:center; gap:8px;
    background:var(--glass); border:1px solid var(--glass-brd);
    border-radius:14px; padding:6px 10px; backdrop-filter:blur(8px);
    pointer-events:none;
  }
  #next .lab{font-size:9px; color:var(--dim); letter-spacing:1.5px}
  #nextDot{width:22px; height:22px; border-radius:50%}

  /* ---- Overlays / Modals ---- */
  .overlay{
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:14px;
    background:radial-gradient(circle at 50% 40%, rgba(10,10,25,.82), rgba(5,5,12,.96));
    backdrop-filter:blur(6px); text-align:center; padding:24px;
    transition:opacity .3s ease, transform .3s ease;
    z-index:var(--z-overlay);
  }
  .overlay.hide{opacity:0; pointer-events:none; transform:translateY(8px)}
  .ttl{font-size:40px; font-weight:900; letter-spacing:2px;
    background:linear-gradient(90deg,var(--pink),var(--gold),var(--cyan));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 40px rgba(255,77,141,.4); line-height:1;
  }
  .sub{color:var(--dim); font-size:14px; max-width:340px; line-height:1.5}
  .bigscore{font-size:64px; font-weight:900; color:var(--gold);
    text-shadow:0 0 30px rgba(255,210,74,.5); line-height:1}
  .newbest{color:var(--grn); font-weight:800; letter-spacing:1px; font-size:14px;
    animation:nb 1s ease infinite alternate}
  @keyframes nb{from{opacity:.5; transform:scale(.96)}to{opacity:1; transform:scale(1.05)}}
  .recap{display:flex; gap:18px; margin-top:4px}
  .recap .b{background:var(--glass); border:1px solid var(--glass-brd); border-radius:14px;
    padding:10px 16px; min-width:96px}
  .recap .b .l{font-size:9px; color:var(--dim); letter-spacing:1.5px; text-transform:uppercase}
  .recap .b .v{font-size:22px; font-weight:800}

  .btn{
    font-family:var(--fam); font-weight:800; letter-spacing:.5px;
    border:none; cursor:pointer; color:#0a0a1a;
    padding:14px 30px; border-radius:16px; font-size:16px;
    background:linear-gradient(180deg,var(--gold),#f0a020);
    box-shadow:0 8px 22px rgba(255,160,32,.35), inset 0 1px 0 rgba(255,255,255,.5);
    transition:transform .12s ease, filter .12s ease;
  }
  .btn:active{transform:translateY(2px) scale(.98); filter:brightness(.95)}
  .btn.alt{background:linear-gradient(180deg,#5a5a8a,#3a3a60); color:#fff;
    box-shadow:0 8px 22px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.18)}
  .btnrow{display:flex; gap:10px; flex-wrap:wrap; justify-content:center}

  /* ---- Shop ---- */
  #shop .grid{
    display:grid; grid-template-columns:1fr; gap:8px; width:100%; max-width:420px;
    max-height:48vh; overflow-y:auto; padding:2px;
  }
  .upg{
    display:flex; align-items:center; gap:12px; text-align:left;
    background:var(--glass); border:1px solid var(--glass-brd); border-radius:14px;
    padding:10px 12px; transition:transform .12s, border-color .12s;
  }
  .upg:hover{transform:translateX(2px); border-color:rgba(255,210,74,.4)}
  .upg.max{opacity:.55}
  .upg .ic{
    width:40px; height:40px; border-radius:12px; flex:0 0 auto;
    display:flex; align-items:center; justify-content:center; font-size:20px;
    background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.02));
    border:1px solid var(--glass-brd);
  }
  .upg .info{flex:1; min-width:0}
  .upg .nm{font-weight:800; font-size:14px}
  .upg .ds{font-size:11px; color:var(--dim); line-height:1.3}
  .upg .lv{font-size:10px; color:var(--cyan); letter-spacing:1px; margin-top:2px}
  .upg .buy{
    font-family:var(--fam); font-weight:800; font-size:13px; cursor:pointer;
    border:none; border-radius:10px; padding:8px 12px; color:#0a0a1a;
    background:linear-gradient(180deg,var(--gold),#f0a020); white-space:nowrap;
  }
  .upg .buy:disabled{background:#3a3a55; color:#888; cursor:not-allowed}
  .upg .buy.maxed{background:linear-gradient(180deg,var(--grn),#1fc77a); color:#04241a}

  .shophead{display:flex; flex-direction:column; align-items:center; gap:4px}
  .shopcoins{color:var(--gold); font-weight:800; font-size:18px}

  /* streak badge */
  #streak{
    position:absolute; top:10px; left:50%; transform:translateX(-50%);
    background:linear-gradient(90deg,rgba(255,77,141,.25),rgba(255,210,74,.25));
    border:1px solid rgba(255,210,74,.4); border-radius:12px;
    padding:4px 12px; font-size:11px; font-weight:800; letter-spacing:1px;
    display:none; align-items:center; gap:6px; z-index:var(--z-hud);
  }
  #streak.on{display:flex}

  .topbtns{position:absolute; top:12px; right:12px; display:flex; gap:6px; z-index:var(--z-hud)}
  .icbtn{
    width:38px; height:38px; border-radius:12px; border:1px solid var(--glass-brd);
    background:var(--glass); color:var(--txt); font-size:18px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; backdrop-filter:blur(8px);
    transition:transform .12s;
  }
  .icbtn:active{transform:scale(.92)}

  /* toast */
  #toast{
    position:absolute; left:50%; bottom:18%; transform:translate(-50%,20px);
    background:rgba(10,10,25,.92); border:1px solid var(--glass-brd);
    border-radius:12px; padding:10px 18px; font-size:13px; font-weight:700;
    opacity:0; transition:opacity .25s, transform .25s; pointer-events:none; z-index:var(--z-toast);
    max-width:90%; text-align:center;
  }
  #toast.show{opacity:1; transform:translate(-50%,0)}

  .credits{position:absolute; bottom:8px; left:0; right:0; text-align:center;
    font-size:10px; color:rgba(255,255,255,.25); letter-spacing:1px; z-index:var(--z-base)}

  @media (max-height:680px){
    .ttl{font-size:32px} .bigscore{font-size:48px} .sub{font-size:12px}
    header{padding:8px 12px 4px} .logo{font-size:17px}
  }
  /* ====== accessibility + Apple polish ====== */
  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{animation-duration:0.01ms!important;animation-iteration-count:1!important;transition-duration:0.01ms!important}
  }
  :focus-visible{outline:2px solid var(--gold);outline-offset:3px;border-radius:4px}
  .icbtn:focus-visible,.btn:focus-visible,.upg .buy:focus-visible{outline-offset:2px}
  canvas:focus-visible{outline-offset:-4px}
  /* will-change hints */
  #combo,.stat.pulse,#toast,.overlay{will-change:transform,opacity}
  .credits{padding-bottom:env(safe-area-inset-bottom,0px)}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
</style>
</head>
<body>
<div id="app">
  <div class="sr-only" aria-live="polite" id="srAnnouncer"></div>
  <header>
    <div class="logo" id="logoBtn" role="button" tabindex="0" title="Main menu">◆ FUSION</div>
    <div class="hud-row">
      <div class="stat" id="scoreStat"><div class="lab">Score</div><div class="val" id="score">0</div></div>
      <div class="stat gold" id="coinStat"><div class="lab">Coins</div><div class="val" id="coins">0</div></div>
    </div>
  </header>

  <main id="stage">
    <canvas id="cv" aria-label="FUSION game — drop and merge balls" role="img"></canvas>

    <div id="streak">🔥 <span id="streakTxt">0 day streak</span></div>

    <div class="topbtns">
      <button class="icbtn" id="shopBtn" title="Shop">🛒</button>
      <button class="icbtn" id="muteBtn" title="Sound">🔊</button>
    </div>

    <div id="combo"></div>

    <div id="next"><span class="lab">NEXT</span><span id="nextDot"></span></div>

    <div id="toast"></div>

    <!-- START -->
    <div class="overlay" id="startScreen">
      <div class="ttl">FUSION</div>
      <div class="sub">Drop matching balls to <b>merge</b> them. Chain merges for <b>combos</b>. Reach the biggest star. Don't overflow the line.</div>
      <button class="btn" id="playBtn">PLAY ▶</button>
      <div class="sub" style="font-size:11px; opacity:.7">Tap / move / tap to drop. Combos = multipliers.</div>
    </div>

    <!-- GAME OVER -->
    <div class="overlay hide" id="overScreen">
      <div class="newbest" id="newBest" style="display:none">★ NEW BEST! ★</div>
      <div class="ttl" style="font-size:30px">GAME OVER</div>
      <div class="bigscore" id="finalScore">0</div>
      <div class="recap">
        <div class="b"><div class="l">Coins +</div><div class="v" id="coinsEarned" style="color:var(--gold)">0</div></div>
        <div class="b"><div class="l">Best Combo</div><div class="v" id="bestCombo" style="color:var(--pink)">0×</div></div>
        <div class="b"><div class="l">Best</div><div class="v" id="bestScore" style="color:var(--cyan)">0</div></div>
      </div>
      <div class="btnrow">
        <button class="btn" id="againBtn">PLAY AGAIN</button>
        <button class="btn alt" id="overShopBtn">🛒 SHOP</button>
      </div>
    </div>

    <!-- SHOP -->
    <div class="overlay hide" id="shopScreen">
      <div class="shophead">
        <div class="ttl" style="font-size:26px">SHOP</div>
        <div class="shopcoins">🪙 <span id="shopCoins">0</span></div>
      </div>
      <div class="grid" id="shopGrid"></div>
      <button class="btn alt" id="closeShop">CLOSE</button>
    </div>

    <div class="credits">FUSION · v1 · Maxween</div>
  </main>
</div>

<script>
"use strict";
/* ============================================================
   FUSION — single-file physics merge game
   Sections: config · state · persistence · ball tiers ·
             canvas/render · physics · juice · input ·
             economy/shop · audio · loop · UI wiring
   ============================================================ */

/* ---------- Config ---------- */
const CFG = {
  GRAVITY: 1900,
  WALL_BOUNCE: 0.32,
  BALL_BOUNCE: 0.18,
  FRICTION: 0.992,
  AIR: 0.999,
  DEATH_LINE_FRAC: 0.16,
  DEATH_GRACE: 1500,
  MAX_TIER: 10,
  PREVIEW_FRAC: 0.92,
};

/* ball tiers: size fraction (of container), hue, name, emoji (debug) */
const TIERS = [
  { frac:0.045, hue:0,   name:"Mote"   },
  { frac:0.060, hue:32,  name:"Spark"  },
  { frac:0.078, hue:55,  name:"Pebble" },
  { frac:0.098, hue:95,  name:"Bud"    },
  { frac:0.120, hue:140, name:"Bloom"  },
  { frac:0.145, hue:175, name:"Tide"   },
  { frac:0.173, hue:210, name:"Azure"  },
  { frac:0.205, hue:265, name:"Plum"   },
  { frac:0.240, hue:300, name:"Rose"   },
  { frac:0.280, hue:335, name:"Crown"  },
  { frac:0.330, hue:45,  name:"Sun"    },
];
/* points for creating a ball of tier i (cumulative reward feel) */
function tierScore(i){ return Math.round(3 * Math.pow(1.6, i)); }
function tierCoins(i){ return Math.max(1, Math.round(Math.pow(1.45, i))); }
const SPAWNABLE = 5; /* tiers 0..4 can be spawned */

/* ---------- State ---------- */
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let W=0,H=0,DPR=1, PLAY_W=0, PLAY_H=0;

const G = {
  balls:[], particles:[], popups:[],
  score:0, displayScore:0,
  coins:0, coinsEarned:0,
  running:false, started:false, over:false,
  dropX:0.5, nextTier:0, curTier:0,
  dropping:false, dropCooldown:0,
  combo:0, comboTimer:0, bestCombo:0,
  shake:0, flash:0,
  deathTimer:0,
  time:0, last:0,
  newBest:false,
  highestTier:0,
};

/* ---------- Persistence ---------- */
const SAVE_KEY='fusion_save_v1';
const DEFAULT_SAVE={ coins:0, best:0, streak:0, lastDay:'', mute:false,
  upgrades:{ magnet:0, startTier:0, scoreBoost:0, coinBoost:0, shield:0, comboTime:0 } };
let SAVE=load();

function load(){
  try{ const s=JSON.parse(localStorage.getItem(SAVE_KEY)||'{}');
    return Object.assign({}, DEFAULT_SAVE, s, {upgrades:Object.assign({},DEFAULT_SAVE.upgrades,(s.upgrades||{}))});
  }catch(e){ return JSON.parse(JSON.stringify(DEFAULT_SAVE)); }
}
function save(){ localStorage.setItem(SAVE_KEY, JSON.stringify(SAVE)); }

/* upgrade defs */
const UPGRADES=[
  {id:'startTier', nm:'Better Start', ds:'Begin with higher-tier balls', max:3, cost:l=>40+l*60, eff:l=>l},
  {id:'scoreBoost',nm:'Score Magnet', ds:'+15% score per level',        max:5, cost:l=>30+l*45, eff:l=>0.15*l},
  {id:'coinBoost', nm:'Coin Magnet',  ds:'+15% coins per level',        max:5, cost:l=>30+l*45, eff:l=>0.15*l},
  {id:'comboTime', nm:'Combo Saver',  ds:'+0.4s combo window per level',max:4, cost:l=>50+l*55, eff:l=>0.4*l},
  {id:'shield',    nm:'Safety Net',   ds:'Survive one overflow (per game)',max:3,cost:l=>80+l*80, eff:l=>l},
  {id:'magnet',    nm:'Smooth Drop',  ds:'Tighter aim, faster control', max:3, cost:l=>25+l*40, eff:l=>l},
];

/* screen-reader announcements */
function announce(msg){ const el=document.getElementById('srAnnouncer'); if(el){ el.textContent=''; el.textContent=msg; } }
/* haptic feedback */
function haptic(pattern){ try{ if(navigator.vibrate) navigator.vibrate(pattern||20); }catch(e){} }

/* ---------- Audio (WebAudio synth, no files) ---------- */
const A = (()=>{
  let ac=null, muted=false;
  function ctx(){ if(!ac){ try{ ac=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return ac; }
  function tone(freq, dur, type='sine', vol=0.18, slide=0){
    if(muted) return; const c=ctx(); if(!c) return;
    const o=c.createOscillator(), g=c.createGain();
    o.type=type; o.frequency.setValueAtTime(freq, c.currentTime);
    if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(40,freq+slide), c.currentTime+dur);
    g.gain.setValueAtTime(0.0001, c.currentTime);
    g.gain.exponentialRampToValueAtTime(vol, c.currentTime+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime+dur);
    o.connect(g).connect(c.destination); o.start(); o.stop(c.currentTime+dur+0.02);
  }
  function noise(dur, vol=0.2){
    if(muted) return; const c=ctx(); if(!c) return;
    const n=c.createBuffer(1, c.sampleRate*dur, c.sampleRate);
    const d=n.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);
    const s=c.createBufferSource(); s.buffer=n; const g=c.createGain(); g.gain.value=vol;
    s.connect(g).connect(c.destination); s.start();
  }
  return {
    setMute(m){ muted=m; },
    merge(i){ tone(220*Math.pow(1.0595, i*2), 0.16, 'triangle', 0.16, 120); },
    drop(){ tone(180, 0.08, 'sine', 0.12, -60); },
    combo(n){ tone(330+n*40, 0.14, 'square', 0.12, 80); },
    coin(){ tone(880,0.06,'square',0.1); tone(1320,0.06,'square',0.08); },
    over(){ tone(200,0.5,'sawtooth',0.18,-120); noise(0.4,0.15); },
    click(){ tone(520,0.05,'square',0.08); },
    win(){ tone(523,0.1,'square',0.12); setTimeout(()=>tone(659,0.1,'square',0.12),90); setTimeout(()=>tone(784,0.16,'square',0.12),180); },
    big(){ tone(440,0.3,'triangle',0.2,400); }
  };
})();

/* ---------- Resize / layout ---------- */
function resize(){
  const rect = cv.getBoundingClientRect();
  DPR = Math.min(window.devicePixelRatio||1, 2);
  cv.width = rect.width*DPR; cv.height = rect.height*DPR;
  W = rect.width; H = rect.height;
  PLAY_W = W; PLAY_H = H;
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize', ()=>{ resize(); positionBallsInBounds(); });

function tierRadius(i){
  const base = Math.min(PLAY_W, PLAY_H);
  return TIERS[i].frac * base * 0.5 * 2; /* frac*base diameter -> radius = frac*base/... */
}
/* (recompute: we want radius = frac*minDim*0.5 -> diameter=frac*minDim) */
function tierRadius(i){ return TIERS[Math.min(i,TIERS.length-1)].frac * Math.min(PLAY_W,PLAY_H) * 0.5; }

function positionBallsInBounds(){
  for(const b of G.balls){
    b.r = tierRadius(b.tier);
    b.x = Math.max(b.r, Math.min(PLAY_W-b.r, b.x));
    b.y = Math.min(PLAY_H-b.r, b.y);
  }
}

/* ---------- Ball factory ---------- */
function makeBall(tier, x, y, vx=0, vy=0){
  return { tier, x, y, vx, vy, r: tierRadius(tier),
    age:0, merged:false, born:G.time, squash:1, glow:1 };
}
function colorFor(tier, light){
  const t=TIERS[Math.min(tier,TIERS.length-1)];
  return `hsl(${t.hue}, ${light}%, ${45+ (light/2)}%)`;
}

/* ---------- Physics ---------- */
function physicsStep(dt){
  /* gravity + integration */
  for(const b of G.balls){
    if(b.merged) continue;
    b.vy += CFG.GRAVITY*dt;
    b.vx *= CFG.AIR; b.vy *= CFG.AIR;
    b.x += b.vx*dt; b.y += b.vy*dt;
    b.age += dt; b.squash += (1-b.squash)*0.2;
    /* walls */
    if(b.x - b.r < 0){ b.x=b.r; b.vx = -b.vx*CFG.WALL_BOUNCE; b.squash=0.8; }
    if(b.x + b.r > PLAY_W){ b.x=PLAY_W-b.r; b.vx=-b.vx*CFG.WALL_BOUNCE; b.squash=0.8; }
    if(b.y + b.r > PLAY_H){ b.y=PLAY_H-b.r; b.vy=-b.vy*CFG.WALL_BOUNCE*1.4; b.vx*=CFG.FRICTION; if(Math.abs(b.vy)<40)b.vy=0; }
  }
  /* pairwise collisions */
  const arr=G.balls;
  for(let i=0;i<arr.length;i++){
    const a=arr[i]; if(a.merged) continue;
    for(let j=i+1;j<arr.length;j++){
      const b=arr[j]; if(b.merged) continue;
      const dx=b.x-a.x, dy=b.y-a.y;
      const dist2=dx*dx+dy*dy;
      const rsum=a.r+b.r;
      if(dist2 < rsum*rsum && dist2>0.0001){
        const dist=Math.sqrt(dist2);
        const nx=dx/dist, ny=dy/dist;
        const overlap=(rsum-dist);
        /* equal-mass positional correction */
        a.x -= nx*overlap*0.5; a.y -= ny*overlap*0.5;
        b.x += nx*overlap*0.5; b.y += ny*overlap*0.5;
        /* relative velocity */
        const rvx=b.vx-a.vx, rvy=b.vy-a.vy;
        const velN = rvx*nx+rvy*ny;
        if(velN<0){
          const e=CFG.BALL_BOUNCE;
          const jimp = -(1+e)*velN/2;
          a.vx -= jimp*nx; a.vy -= jimp*ny;
          b.vx += jimp*nx; b.vy += jimp*ny;
          a.squash=0.86; b.squash=0.86;
        }
        /* merge condition */
        if(a.tier===b.tier && a.tier<CFG.MAX_TIER && a.age>0.05 && b.age>0.05){
          scheduleMerge(a,b);
        }
      }
    }
  }
  /* remove merged, substep handled in resolveMerges */
  resolveMerges();
}

let pendingMerges=[];
function scheduleMerge(a,b){
  if(a.merged||b.merged) return;
  /* dedupe: if either already in a pending pair, skip */
  a.merged=true; b.merged=true;
  pendingMerges.push([a,b]);
}
function resolveMerges(){
  if(!pendingMerges.length) return;
  const pairs=pendingMerges; pendingMerges=[];
  for(const [a,b] of pairs){
    const nt=a.tier+1;
    const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
    const nvx=(a.vx+b.vx)/2, nvy=(a.vy+b.vy)/2;
    const nb=makeBall(nt,mx,my,nvx,nvy);
    nb.squash=0.6; nb.glow=2;
    G.balls=G.balls.filter(x=>x!==a&&x!==b);
    G.balls.push(nb);
    onMerge(nb, [a,b]);
  }
}

/* ---------- Merge reward + combo ---------- */
function onMerge(nb, src){
  G.combo++; G.comboTimer = 1.4 + (SAVE.upgrades.comboTime||0)*0.4;
  if(G.combo>G.bestCombo) G.bestCombo=G.combo;
  const mult = 1 + (G.combo-1)*0.5;
  const sBoost = 1 + (SAVE.upgrades.scoreBoost||0)*0.15;
  const cBoost = 1 + (SAVE.upgrades.coinBoost||0)*0.15;
  const pts = Math.round(tierScore(nb.tier)*mult*sBoost);
  const coin = Math.round(tierCoins(nb.tier)*mult*cBoost);
  G.score += pts; G.coins += coin; G.coinsEarned += coin;
  if(nb.tier>G.highestTier){ G.highestTier=nb.tier; if(nb.tier>=7){ A.big(); haptic([30,20,40]); } }
  juice.mergeBurst(nb.x,nb.y,nb.tier,pts,G.combo);
  A.merge(nb.tier); haptic([15]);
  if(G.combo>1){ A.combo(G.combo); haptic([15,10,15]); }
  showCombo(G.combo, nb.tier);
  pulse('scoreStat'); pulse('coinStat');
  if(nb.tier>=CFG.MAX_TIER){ G.score += 1000; A.win(); juice.confetti(nb.x,nb.y); toast('★ MAX TIER! +1000 ★'); announce('Max tier reached!'); haptic([40,30,40,30,80]); }
}

/* ---------- Juice / FX ---------- */
const juice = {
  mergeBurst(x,y,tier,pts,combo){
    const hue=TIERS[Math.min(tier,TIERS.length-1)].hue;
    const n=8+combo*2;
    for(let i=0;i<n;i++){
      const a=Math.random()*Math.PI*2, sp=80+Math.random()*180;
      G.particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
        life:0.5+Math.random()*0.3, age:0, r:2+Math.random()*3, hue:hue+(Math.random()*30-15)});
    }
    G.popups.push({x,y,vy:-60,life:0.9,age:0,text:'+'+pts,hue:50+(combo*8)});
    G.shake=Math.min(14, 3+combo*2+tier);
    G.flash=Math.min(0.4, 0.05+combo*0.03);
  },
  confetti(x,y){
    for(let i=0;i<60;i++){
      const a=Math.random()*Math.PI*2, sp=120+Math.random()*260;
      G.particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-100,
        life:1+Math.random()*0.6,age:0,r:2+Math.random()*4,hue:Math.random()*360});
    }
  },
};

/* ---------- Rendering ---------- */
function render(dt){
  ctx.clearRect(0,0,W,H);
  /* screen shake */
  let sx=0,sy=0;
  if(G.shake>0){ sx=(Math.random()*2-1)*G.shake; sy=(Math.random()*2-1)*G.shake; G.shake*=0.86; if(G.shake<0.3)G.shake=0; }
  ctx.save(); ctx.translate(sx,sy);

  /* danger line */
  const lineY = PLAY_H*CFG.DEATH_LINE_FRAC;
  const over = G.deathTimer>0;
  ctx.save();
  ctx.setLineDash([10,8]);
  ctx.lineWidth=2;
  ctx.strokeStyle = over ? 'rgba(255,84,112,0.9)':'rgba(255,255,255,0.18)';
  if(over){ ctx.shadowColor='rgba(255,84,112,0.7)'; ctx.shadowBlur=12; }
  ctx.beginPath(); ctx.moveTo(0,lineY); ctx.lineTo(PLAY_W,lineY); ctx.stroke();
  ctx.restore();

  /* flash overlay */
  if(G.flash>0){
    ctx.fillStyle=`rgba(255,255,255,${G.flash})`; ctx.fillRect(0,0,W,H);
    G.flash*=0.85; if(G.flash<0.01)G.flash=0;
  }

  /* balls */
  for(const b of G.balls){ drawBall(b); }

  /* ghost preview + current ball */
  if(G.running && !G.over && G.curTier>=0 && !G.dropping){
    drawGhost();
    drawCurrentBall();
  }

  /* particles */
  for(const p of G.particles){
    const k=1-p.age/p.life;
    ctx.globalAlpha=Math.max(0,k);
    ctx.fillStyle=`hsl(${p.hue},90%,65%)`;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*k+0.5,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  /* popups */
  for(const p of G.popups){
    const k=1-p.age/p.life;
    ctx.globalAlpha=Math.max(0,k);
    ctx.fillStyle=`hsl(${p.hue},95%,65%)`;
    ctx.font='800 20px '+getComputedStyle(document.body).fontFamily;
    ctx.textAlign='center'; ctx.shadowColor=ctx.fillStyle; ctx.shadowBlur=8;
    ctx.fillText(p.text, p.x, p.y);
    ctx.shadowBlur=0;
  }
  ctx.globalAlpha=1;
  ctx.restore();
}

function drawBall(b){
  const t=TIERS[Math.min(b.tier,TIERS.length-1)];
  const hue=t.hue;
  const r=b.r;
  /* squash scale */
  const sx=b.squash, sy=2-b.squash;
  ctx.save(); ctx.translate(b.x,b.y); ctx.scale(sx,sy);
  /* glow */
  if(b.glow>1){ b.glow+=(1-b.glow)*0.15; }
  ctx.shadowColor=`hsla(${hue},90%,60%,0.8)`;
  ctx.shadowBlur=10*b.glow;
  /* body gradient (3D) */
  const g=ctx.createRadialGradient(-r*0.35,-r*0.4,r*0.1, 0,0,r);
  g.addColorStop(0,`hsl(${hue},90%,80%)`);
  g.addColorStop(0.45,`hsl(${hue},85%,58%)`);
  g.addColorStop(1,`hsl(${hue},80%,32%)`);
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  /* rim */
  ctx.lineWidth=Math.max(1,r*0.04);
  ctx.strokeStyle=`hsla(${hue},90%,75%,0.5)`;
  ctx.beginPath(); ctx.arc(0,0,r*0.98,0,Math.PI*2); ctx.stroke();
  /* highlight */
  ctx.fillStyle='rgba(255,255,255,0.55)';
  ctx.beginPath(); ctx.ellipse(-r*0.32,-r*0.4, r*0.28, r*0.18, -0.5, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawGhost(){
  const r=curBallRadius();
  const x=G.dropX*PLAY_W;
  const y0 = r+4;
  ctx.save();
  ctx.globalAlpha=0.18;
  ctx.strokeStyle=`hsla(${TIERS[G.curTier].hue},90%,70%,1)`;
  ctx.setLineDash([5,6]); ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(x,y0+r); ctx.lineTo(x,PLAY_H-6); ctx.stroke();
  ctx.restore();
}
function drawCurrentBall(){
  const r=curBallRadius();
  const x=G.dropX*PLAY_W;
  const y=r+4;
  const t=TIERS[G.curTier];
  ctx.save();
  /* subtle bob */
  const bob=Math.sin(G.time*4)*2;
  ctx.translate(x,y+bob);
  ctx.shadowColor=`hsla(${t.hue},90%,60%,0.8)`; ctx.shadowBlur=14;
  const g=ctx.createRadialGradient(-r*0.35,-r*0.4,r*0.1, 0,0,r);
  g.addColorStop(0,`hsl(${t.hue},90%,80%)`);
  g.addColorStop(0.45,`hsl(${t.hue},85%,58%)`);
  g.addColorStop(1,`hsl(${t.hue},80%,32%)`);
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
  ctx.restore();
}
function curBallRadius(){ return tierRadius(G.curTier); }

/* ---------- Game flow ---------- */
function newGame(){
  G.balls=[]; G.particles=[]; G.popups=[]; pendingMerges=[];
  G.score=0; G.displayScore=0; G.coinsEarned=0;
  G.combo=0; G.comboTimer=0; G.bestCombo=0;
  G.over=false; G.running=true; G.started=true;
  G.deathTimer=0; G.newBest=false; G.highestTier=0;
  G.shieldUsed=false;
  const st=SAVE.upgrades.startTier||0;
  G.curTier = Math.min(st, SPAWNABLE-1);
  G.nextTier = Math.min(st + Math.floor(Math.random()*2), SPAWNABLE-1);
  G.dropping=false; G.dropCooldown=0;
  updateNextDot();
  updateHUD();
}

function nextBall(){
  G.curTier=G.nextTier;
  const st=SAVE.upgrades.startTier||0;
  /* higher start tier = can occasionally spawn one tier up */
  const top=Math.min(SPAWNABLE-1, st+1);
  G.nextTier=Math.floor(Math.random()*(top-st+1))+st;
  updateNextDot();
}

function dropBall(){
  if(G.dropping||G.over||!G.running) return;
  if(G.dropCooldown>0) return;
  G.dropping=true; G.dropCooldown=0.18;
  const b=makeBall(G.curTier, G.dropX*PLAY_W, curBallRadius()+4, 0, 60);
  G.balls.push(b);
  A.drop();
  G.shake=Math.max(G.shake,2);
  setTimeout(()=>{ /* brief lockout */
    G.dropping=false;
    nextBall();
  }, 160);
}

function endGame(){
  if(G.over) return;
  /* shield check */
  const shieldLvl=SAVE.upgrades.shield||0;
  if(shieldLvl>0 && !G.shieldUsed){
    G.shieldUsed=true;
    /* remove the highest offending ball(s) above line to give a second chance */
    const lineY=PLAY_H*CFG.DEATH_LINE_FRAC;
    let worst=null;
    for(const b of G.balls){ if(b.y-b.r<lineY && (!worst||b.y<worst.y)) worst=b; }
    if(worst){ G.balls=G.balls.filter(x=>x!==worst); juice.confetti(worst.x,worst.y); }
    G.deathTimer=0;
    toast('🛡 SHIELD! Saved.');
    return;
  }
  G.over=true; G.running=false;
  A.over(); haptic([60,40,100]);
  announce('Game over. Score: '+G.score.toLocaleString()+'.');
  /* streak + best + coins persist */
  G.newBest = G.score>SAVE.best;
  if(G.newBest) SAVE.best=G.score;
  SAVE.coins += G.coinsEarned;
  /* daily streak */
  const today=new Date().toDateString();
  if(SAVE.lastDay!==today){
    if(SAVE.lastDay && daysBetween(SAVE.lastDay,today)===1){ SAVE.streak=(SAVE.streak||0)+1; }
    else SAVE.streak=1;
    SAVE.lastDay=today;
    const bonus=10+SAVE.streak*5;
    SAVE.coins+=bonus;
    toast(`🔥 ${SAVE.streak} day streak! +${bonus} coins`);
  }
  save();
  showGameOver();
}
function daysBetween(a,b){ const d1=new Date(a),d2=new Date(b); return Math.round((d2-d1)/86400000); }

/* ---------- Combo banner ---------- */
const comboEl=document.getElementById('combo');

  comboEl.textContent = c>=2 ? `${c}× COMBO!` : '';
  comboEl.style.color = colors[Math.min(c,colors.length-1)];

}

/* ---------- Shop ---------- */
function renderShop(){
  document.getElementById('shopCoins').textContent=SAVE.coins.toLocaleString();
  const grid=document.getElementById('shopGrid'); grid.innerHTML='';
  for(const u of UPGRADES){
    const lvl=SAVE.upgrades[u.id]||0;
    const maxed=lvl>=u.max;
    const cost=maxed?0:u.cost(lvl);
    const can=SAVE.coins>=cost && !maxed;
    const div=document.createElement('div'); div.className='upg'+(maxed?' max':'');
    div.innerHTML=`
      <div class="ic">${ICONS[u.id]}</div>
      <div class="info">
        <div class="nm">${u.nm}</div>
        <div class="ds">${u.ds}</div>
        <div class="lv">${'★'.repeat(lvl)}${'☆'.repeat(u.max-lvl)}</div>
      </div>
      <button class="buy ${maxed?'maxed':''}" ${(!can&&!maxed)?'disabled':''}>
        ${maxed?'MAX':cost+' 🪙'}
      </button>`;
    const btn=div.querySelector('.buy');
    if(!maxed) btn.onclick=()=>buyUpgrade(u);
    grid.appendChild(div);
  }
}
const ICONS={ startTier:'🌱', scoreBoost:'⭐', coinBoost:'🪙', comboTime:'⏱', shield:'🛡', magnet:'🧲' };
function buyUpgrade(u){
  const lvl=SAVE.upgrades[u.id]||0;
  if(lvl>=u.max) return;
  const cost=u.cost(lvl);
  if(SAVE.coins<cost){ toast('Not enough coins'); return; }
  SAVE.coins-=cost; SAVE.upgrades[u.id]=lvl+1; save();
  A.coin(); toast(`${u.nm} → Lv ${lvl+1}`); renderShop();
}

/* ---------- Input ---------- */
function setDropX(clientX){
  if(G.over||!G.running) return;
  const rect=cv.getBoundingClientRect();
  let nx=(clientX-rect.left)/rect.width;
  const r=curBallRadius();
  const minx=r/PLAY_W, maxx=1-r/PLAY_W;
  nx=Math.max(minx,Math.min(maxx,nx));
  /* magnet upgrade = snappier */
  const snap = (SAVE.upgrades.magnet||0);
  G.dropX += (nx-G.dropX)*(0.35+snap*0.2);
}
cv.addEventListener('pointermove', e=>setDropX(e.clientX));
cv.addEventListener('pointerdown', e=>{ setDropX(e.clientX); });
cv.addEventListener('pointerup', e=>{ setDropX(e.clientX); dropBall(); });
/* keyboard */
window.addEventListener('keydown', e=>{
  if(e.key==='ArrowLeft'){ G.dropX=Math.max(0.05,G.dropX-0.05); }
  else if(e.key==='ArrowRight'){ G.dropX=Math.min(0.95,G.dropX+0.05); }
  else if(e.key===' '||e.key==='Enter'){ e.preventDefault(); dropBall(); }
});

/* ---------- Main loop ---------- */
function loop(ts){
  if(!G.last) G.last=ts;
  let dt=(ts-G.last)/1000; G.last=ts;
  dt=Math.min(dt,0.033);
  G.time+=dt;
  if(G.dropCooldown>0) G.dropCooldown-=dt;

  if(G.running && !G.over){
    /* fixed-ish substeps for stability */
    const steps=3;
    for(let i=0;i<steps;i++) physicsStep(dt/steps);
    /* combo decay */
    if(G.comboTimer>0){ G.comboTimer-=dt; if(G.comboTimer<=0){ G.combo=0; } }
    /* death detection */
    checkDeath(dt);
  }
  /* update particles & popups (even on game over for nice finish) */
  for(const p of G.particles){ p.age+=dt; p.vy+=240*dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=0.98; }
  G.particles=G.particles.filter(p=>p.age<p.life);
  for(const p of G.popups){ p.age+=dt; p.y+=p.vy*dt; p.vy+=30*dt; }
  G.popups=G.popups.filter(p=>p.age<p.life);

  render(dt);
  if(G.running) updateHUD();
  requestAnimationFrame(loop);
}

function checkDeath(dt){
  const lineY=PLAY_H*CFG.DEATH_LINE_FRAC;
  let danger=false;
  for(const b of G.balls){
    if(b.y-b.r < lineY && b.age>0.6 && Math.abs(b.vy)<140){ danger=true; break; }
  }
  if(danger){ G.deathTimer+=dt*1000; if(G.deathTimer>=CFG.DEATH_GRACE) endGame(); }
  else G.deathTimer=Math.max(0,G.deathTimer-dt*1200);
}

  document.getElementById('coins').textContent=SAVE.coins.toLocaleString();
  document.getElementById('muteBtn').textContent=SAVE.mute?'🔇':'🔊';
  A.setMute(SAVE.mute);
  refreshStreak();
  requestAnimationFrame(loop);
}
init();
</script>
